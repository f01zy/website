<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>f01zy</title>
    <link rel="icon" href="assets/favicon.png" type="image/png" sizes="32x32" />

    <!-- STYLES -->
    <link rel="stylesheet" href="/src/client/styles/variables.css" />
    <link rel="stylesheet" href="/src/client/styles/styles.css" />
    <link rel="stylesheet" href="/third_party/markdown.css" />

    <!-- SCRIPTS -->
    <script src="/third_party/marked.js" defer></script>
    <script src="/third_party/purify.js" defer></script>
    <script src="/src/client/scripts/art.js" type="module" defer></script>
    <script src="/src/client/scripts/animation.js" type="module" defer></script>
    <script src="/src/client/scripts/footer.js" type="module" defer></script>
    <script src="/src/client/scripts/links.js" type="module" defer></script>
    <script src="/src/client/scripts/posts.js" type="module" defer></script>
    <script src="/src/client/scripts/projects.js" type="module" defer></script>
    <script src="/src/client/scripts/utils.js" type="module" defer></script>
    <script src="/src/client/scripts/main.js" type="module" defer></script>
  </head>
  <body>
    <div class="page-wrapper">
      <nav>
        <a href="/">Home</a>
        <a href="/projects">Projects</a>
        <a href="/posts">Posts</a>
      </nav>

      <main class="content-wrapper">
        <div class="projects container blocks none"></div>
        <div class="posts container blocks none"></div>
        <div class="post container scrollable none"></div>

        <div class="home container not-scrollable none">
          <canvas></canvas>
          <h1>f01zy</h1>
          <p>
            Hi, I'm f01zy. I develop terminal utilities and low-level software in C under Linux. Outside of coding, I enjoy reading light novels and playing
            chess.
          </p>
          <div class="links"></div>
        </div>

        <div class="new-post container not-scrollable none">
          <form class="post-form">
            <h2>New post</h2>
            <p class="status-message none"></p>
            <div class="form-group">
              <input type="text" name="title" class="form-input" placeholder="Title" required />
            </div>
            <div class="form-group">
              <input type="text" name="preview" class="form-input" placeholder="Preview" required />
            </div>
            <div class="form-group">
              <textarea name="content" class="form-textarea" placeholder="Some text..." rows="7" required></textarea>
            </div>
            <div class="form-group file-upload-group">
              <label for="image-uploader" class="form-file-label">
                <span>Upload images</span>
              </label>
              <input type="file" name="files" id="image-uploader" class="form-file-input" accept="image/*" multiple />
            </div>
            <button type="submit" class="form-submit">
              <span>Publish</span>
            </button>
          </form>
        </div>

        <div class="empty container not-scrollable none">
          <h2>Empty</h2>
          <p>It's empty here for now <span>(the sound of tumbleweeds)</span>.</p>
        </div>

        <div class="not-found container not-scrollable none">
          <h2>Not Found</h2>
          <a class="back-link" href="/">go back</a>
        </div>
      </main>

      <footer></footer>
    </div>
  </body>
</html>
