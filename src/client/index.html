<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>f01zy</title>
    <link rel="icon" href="assets/favicon.png" type="image/png" sizes="32x32" />

    <link rel="stylesheet" href="/src/client/styles/variables.css" />
    <link rel="stylesheet" href="/src/client/styles/home.css" />
    <link rel="stylesheet" href="/src/client/styles/blocks.css" />
    <link rel="stylesheet" href="/src/client/styles/posts.css" />
    <link rel="stylesheet" href="/src/client/styles/styles.css" />
    <link rel="stylesheet" href="/third_party/styles/markdown.css" />
    <link rel="stylesheet" href="/third_party/styles/katex.css" />
    <link rel="stylesheet" href="/third_party/styles/highlight.css" />

    <script src="/third_party/scripts/highlight.js" defer></script>
    <script src="/third_party/scripts/marked-highlight.js" defer></script>
    <script src="/third_party/scripts/marked.js" defer></script>
    <script src="/third_party/scripts/katex.js" defer></script>
    <script src="/third_party/scripts/marked-katex-extension.js" defer></script>
    <script src="/third_party/scripts/purify.js" defer></script>
    <script src="/src/client/scripts/art.js" type="module" defer></script>
    <script src="/src/client/scripts/animation.js" type="module" defer></script>
    <script src="/src/client/scripts/footer.js" type="module" defer></script>
    <script src="/src/client/scripts/links.js" type="module" defer></script>
    <script src="/src/client/scripts/posts.js" type="module" defer></script>
    <script src="/src/client/scripts/projects.js" type="module" defer></script>
    <script src="/src/client/scripts/utils.js" type="module" defer></script>
    <script src="/src/client/scripts/main.js" type="module" defer></script>
  </head>
  <body>
    <div class="page-wrapper">
      <nav>
        <a href="/">Home</a>
        <a href="/projects">Projects</a>
        <a href="/posts">Posts</a>
      </nav>

      <main class="content-wrapper">
        <div class="projects container blocks none"></div>
        <div class="posts container blocks none"></div>
        <div class="post container scrollable none"></div>

        <div class="home container not-scrollable none">
          <canvas></canvas>
          <h1>f01zy</h1>
          <p>
            Hi, I'm f01zy. I develop terminal utilities and low-level software in C under Linux. Outside of coding, I enjoy reading light novels and playing
            chess.
          </p>
          <div class="links"></div>
        </div>

        <div class="new-post container not-scrollable none">
          <form class="post-form">
            <p class="status-message none"></p>
            <input type="text" name="title" class="post-title" placeholder="Post Title" required />
            <div class="post-meta">
              <label for="image-uploader" class="form-file-label-compact">
                <span>Upload Image</span>
              </label>
              <input type="file" name="files" id="image-uploader" class="form-file-input" accept="image/*" />
              <input type="text" name="tags" class="form-ghost-input-tags" placeholder="tags, split, by, comma" />
              <span class="post-date">Draft</span>
            </div>
            <hr class="post-divider" />
            <input type="text" name="preview" class="form-ghost-input-preview" placeholder="Short post preview..." required />
            <div class="editor-workspace">
              <textarea
                name="content"
                class="form-ghost-textarea"
                placeholder="Write your story here in Markdown... (Press Ctrl + P to preview)"
                rows="15"
                required
              ></textarea>
              <div class="preview-container post-content markdown-body none"></div>
            </div>
            <button type="submit" class="form-submit">
              <span>Publish</span>
            </button>
          </form>
        </div>

        <div class="empty container not-scrollable none">
          <h2>Empty</h2>
          <p>It's empty here for now <span>(the sound of tumbleweeds)</span>.</p>
        </div>

        <div class="not-found container not-scrollable none">
          <h2>Not Found</h2>
          <a class="back-link" href="/">go back</a>
        </div>
      </main>

      <footer></footer>
    </div>
  </body>
</html>
